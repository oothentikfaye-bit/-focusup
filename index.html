<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FocusUP - Design Moderne</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">
        <header>
            <nav class="tabs">
    <button onclick="ouvrirOnglet('revisions')">📅 Révisions</button>
    <button onclick="ouvrirOnglet('cours')">📚 Mes Cours</button>
</nav>

<!-- Entoure ton ancienne section de révision par cette div -->
<div id="revisions" class="tab-content">
    <!-- Ton code actuel (Ajout tâche + Liste) -->
</div>

<!-- Ajoute cette nouvelle section pour les notes de cours -->
<div id="cours" class="tab-content" style="display:none;">
    <h2>Base de Connaissances</h2>
    <select id="selectCoursNotes">
        <option value="Informatique">Informatique</option>
        <option value="Maths">Maths</option>
        <option value="Litterature">Littérature</option>
    </select>
    <textarea id="zoneNotes" placeholder="Écris tes résumés ici..."></textarea>
    <button id="btnSauverNotes">💾 Sauvegarder les notes</button>
    
    <hr>
    <h3>🤖 Assistant IA</h3>
    <p style="font-size: 12px; color: #666;">Demande une explication sur ce cours :</p>
    <button onclick="demanderIA()" class="btn-ia">Explique-moi ce concept</button>
</div>
            <h1>FocusUP</h1>
            <p>Gère tes révisions avec style</p>
        </header>

        <section id="ajout-tache">
            <!-- Menu de sélection du cours -->
            <select id="choixCours">
                <option value="📚Sémiotique générale">Sémiotique générale</option>             <option value="Exercice professionnel">Exercice professionnel</option>
                <option value="📚 litterature Francaise">Littérature Française</option>
                <option value="📚 lingustique Diachronique">Linguistique Diachronique</option>
                <option value="📚 Littérature Comparée">Littérature Comparée</option>
                <option value="📚 Anglais">Anglais</option>
                <option value="📚Dramaturgie">Dramaturgie</option>
                <option value="📚linguistique francaise">Linguistique Française</option>
                <option value="📚 Autre">Autre</option>
            </select>

            <!-- Champ de saisie -->
            <input type="text" id="inputTache" placeholder="Ex: Réviser le chapitre 1...">
            
            <!-- Bouton Ajouter -->
            <button id="btnAjouter">✨ Ajouter la révision</button>

        </section>

        <section id="liste-section">
            <p id="messageCompteur"></p>
            <ul id="listeTaches"></ul>
        </section>
    </div>

    <!-- LE SCRIPT DOIT ÊTRE ICI, JUSTE AVANT LE /BODY -->
    <script src="script.js"></script>
</body>
</html>
