<link rel="manifest" href="manifest.json">
<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FocusUP - Design Moderne</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="app">
    <!-- ÉCRAN 1 : ACCUEIL (Minimaliste) -->
    <div id="ecran-accueil" class="view">
        <div class="hero">
            <h1 class="logo-grand">FocusUP</h1>
            <p class="tagline">Ton succès commence ici.</p>
            <button id="btn-ouvrir" onclick="changerVue('ecran-principal')">
                ✨ Ajouter une révision
            </button>
        </div>
    </div>

    <!-- ÉCRAN 2 : L'APPLICATION (Le Cœur) -->
    <div id="ecran-principal" class="view" style="display: none;">
        <!-- Barre de navigation du haut -->
        <header class="app-header">
            <button onclick="changerVue('ecran-accueil')" class="btn-retour">←</button>
            <h2>Tableau de bord</h2>
        </header>

        <!-- Menu de navigation (Onglets en bas comme sur iPhone) -->
        <nav class="bottom-nav">
            <button onclick="afficherSection('section-taches')">📅 Tâches</button>
            <button onclick="afficherSection('section-cours')">📚 Cours</button>
            <button onclick="afficherSection('section-ia')">🤖 IA</button>
        </nav>

        <!-- SECTION 1 : LES TÂCHES -->
        <section id="section-taches" class="app-section">
            <div class="card">
                <h3>Nouvelle Révision</h3>
                <select id="choixCours">
                    <option value="💻 litterature compaere">Littérature Compagnon</option>
                    <option value="linguistique diachronique">Linguistique Diachronique</option>
                    <option value="dramaturgie">Dramaturgie</option>
                    <option value="exercice professionels">Exercices Professionnels</option>
                    <option value="analyse du discours">Analyse du Discours</option>
                    <option value="📐 litterature francaise">Littérature Française</option>
                    <option value="linguistique francaise">Linguistique Française</option>
                    <option value="semiotique">Sémiotique</option>
                </select>
                <input type="text" id="inputTache" placeholder="Quoi réviser ?">
                <button id="btnAjouter" class="btn-primary">Ajouter</button>
            </div>
            <p id="messageCompteur"></p>
            <ul id="listeTaches"></ul>
        </section>

        <!-- SECTION 2 : MÉMOIRE DE STOCKAGE (COURS) -->
        <section id="section-cours" class="app-section" style="display:none;">
            <div class="card">
                <h3>Mémoire de stockage</h3>
                <select id="selectCoursNotes">
                    <option value="Litterature">Littérature</option>
                    <option value="Maths">Mathématiques</option>
                    <option value="Informatique">Informatique</option>
                </select>
                <textarea id="zoneNotes" placeholder="Écris ton résumé ici..."></textarea>
                <button id="btnSauverNotes" class="btn-primary">💾 Sauvegarder le résumé</button>
            </div>
        </section>

        <!-- SECTION 3 : ASSISTANT IA -->
        <section id="section-ia" class="app-section" style="display:none;">
            <div class="card ia-card">
                <h3>Assistant IA</h3>
                <p>Besoin d'aide pour comprendre un cours ?</p>
                <button onclick="demanderIA()" class="btn-ia">🚀 Analyser mon résumé avec l'IA</button>
                <div id="ia-reponse" class="ia-box">L'IA t'aidera à approfondir tes connaissances...</div>
            </div>
        </section>
    </div>
</div>

</body>
</html>
