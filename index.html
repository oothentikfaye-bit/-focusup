<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FocusUP - Professional</title>
    <link rel="stylesheet" href="style.css?v=2">
</head>
<body>

    <!-- ÉCRAN 1 : ACCUEIL (SPLASH SCREEN) -->
    <div id="ecran-accueil" class="view">
        <div class="hero">
            <h1 class="logo-text">FocusUP</h1>
            <p>Ton assistant d'étude intelligent</p>
            <button class="btn-demarrer" onclick="changerVue('ecran-principal')">
                ✨ Ajouter une révision
            </button>
        </div>
    </div>

    <!-- ÉCRAN 2 : APPLICATION (DASHBOARD) -->
    <div id="ecran-principal" class="view" style="display: none;">
        
        <header class="top-bar">
            <button onclick="changerVue('ecran-accueil')" class="back-btn">←</button>
            <h2 id="titre-section">Révisions</h2>
        </header>

        <!-- SECTION TÂCHES -->
        <div id="section-taches" class="app-section">
            <div class="card-saisie">
                <select id="choixCours">
                    <option value="🇫🇷 Littérature">Littérature Française</option>
                    <option value="📐 Mathématiques">Mathématiques</option>
                    <option value="💻 Informatique">Informatique</option>
                    <option value="📚 Autre">Autre matière</option>
                </select>
                <input type="text" id="inputTache" placeholder="Ex: Réviser le chapitre 2...">
                <button id="btnAjouter" class="btn-action">Ajouter à la liste</button>
            </div>
            
            <p id="messageCompteur"></p>
            <ul id="listeTaches"></ul>
        </div>

        <!-- SECTION COURS (MÉMOIRE) -->
        <div id="section-cours" class="app-section" style="display: none;">
            <div class="card-saisie">
                <h3>Mémoire de stockage</h3>
                <select id="selectCoursNotes">
                    <option value="Litterature comparee">Littérature comparee</option>
                    <option value="litterature francaise ">Littérature française</option>
                    <option value="linguistique francaise">Linguistique française</option>
                    <option value="linguistique diachronique">Linguistique diachronique</option>
                    <option value="exo pro">Exercices professionnels</option>
                    <option value="Analyse du discours">Analyse du discours</option>
                    <option value="Damaturgie">Damaturgie</option>
                    <option value="Semiotique">Sémiotique</option>
                </select>
                <textarea id="zoneNotes" placeholder="Rédige ton résumé de cours ici..."></textarea>
                <button id="btnSauverNotes" class="btn-action">💾 Sauvegarder</button>
            </div>
        </div>

        <!-- SECTION IA -->
        <div id="section-ia" class="app-section" style="display: none;">
            <div class="card-saisie">
                <h3>Assistant IA</h3>
                <p>Analyse tes notes pour mieux comprendre.</p>
                <button onclick="demanderIA()" class="btn-ia">🚀 Analyser avec FocusUP AI</button>
                <div id="ia-reponse" class="box-ia">L'IA attend tes notes...</div>
            </div>
        </div>

        <!-- BARRE DE NAVIGATION BASSE (FIXE) -->
        <nav class="nav-bar">
            <button onclick="afficherSection('section-taches', 'Révisions')">📅</button>
            <button onclick="afficherSection('section-cours', 'Cours')">📚</button>
            <button onclick="afficherSection('section-ia', 'Assistant IA')">🤖</button>
        </nav>

    </div>

    <script src="script.js"></script>
</body>
</html>
